<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #ffff00;
            color: #000000;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            padding: 12px 20px;
            background: #161616;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
        }

        header button {
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #333;
            background: #1e1e1e;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }

        header button:hover { border-color: #c9a84c; color: #c9a84c; }

        #websearch-btn.active {
            border-color: #4caf82;
            color: #4caf82;
            background: rgba(76, 175, 130, 0.1);
        }

        #search-indicator {
            font-size: 12px;
            color: #4caf82;
            display: none;
        }

        /* ── MESSAGES ── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

        .msg-wrap {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 75%;
        }

        .msg-wrap.user { align-self: flex-end; align-items: flex-end; }
        .msg-wrap.ai   { align-self: flex-start; align-items: flex-start; }

        .msg-label {
            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #555;
        }

        .msg-wrap.user .msg-label { color: #8a7040; }
        .msg-wrap.ai   .msg-label { color: #3a7a8a; }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        .msg-wrap.user .msg-bubble {
            background: #2a2010;
            border: 1px solid #3a3010;
            color: #d4c08a;
            border-radius: 12px 12px 2px 12px;
        }

        .msg-wrap.ai .msg-bubble {
            background: #101820;
            border: 1px solid #1a2830;
            color: #c0d0d8;
            border-radius: 12px 12px 12px 2px;
        }

        .msg-bubble p { margin-bottom: 8px; }
        .msg-bubble p:last-child { margin-bottom: 0; }
        .msg-bubble strong { color: #c9a84c; }
        .msg-bubble code {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 12px;
            color: #7ac;
        }
        .msg-bubble pre {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-left: 3px solid #c9a84c;
            border-radius: 4px;
            padding: 12px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 12px;
            line-height: 1.5;
        }
        .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 6px 0; }
        .msg-bubble li { margin-bottom: 3px; }

        /* Image in message bubble */
        .msg-image {
            max-width: 260px;
            border-radius: 8px;
            margin-bottom: 6px;
            border: 1px solid #2a2a2a;
            display: block;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 14px;
            background: #101820;
            border: 1px solid #1a2830;
            border-radius: 12px 12px 12px 2px;
        }
        .typing span {
            width: 6px; height: 6px;
            background: #3a7a8a;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.15s; }
        .typing span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
            40%            { transform: scale(1.1); opacity: 1; }
        }

        /* ── IMAGE PREVIEW BAR ── */
        #image-preview-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: #161616;
            border-top: 1px solid #2a2a2a;
        }

        #image-preview {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #3a3010;
        }

        #remove-image-btn {
            background: none;
            border: 1px solid #444;
            color: #888;
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
        }

        #remove-image-btn:hover { border-color: #e05c5c; color: #e05c5c; }

        .preview-label {
            font-size: 11px;
            color: #555;
        }

        /* ── INPUT BAR ── */
        .input-bar {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            padding: 12px 16px;
            background: #161616;
            border-top: 1px solid #2a2a2a;
            flex-shrink: 0;
        }

        #upload-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #888;
            border-radius: 10px;
            padding: 0 12px;
            height: 44px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        #upload-btn:hover { border-color: #c9a84c; color: #c9a84c; }
        #upload-btn.has-file { border-color: #4caf82; color: #4caf82; }

        #input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 14px;
            padding: 10px 14px;
            border-radius: 10px;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 120px;
            line-height: 1.5;
            transition: border-color 0.2s;
        }

        #input:focus { border-color: #c9a84c; }
        #input::placeholder { color: #444; }

        #send-btn {
            background: #c9a84c;
            color: #0d0d0d;
            border: none;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            padding: 0 18px;
            height: 44px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        #send-btn:hover    { background: #e0c060; }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── EDITOR PANEL ── */
        #editor-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #editor-panel.show { display: flex; }
        .editor-box {
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            width: min(800px, 95vw);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .editor-header {
            padding: 14px 18px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .editor-title { font-size: 13px; color: #c9a84c; font-weight: 600; }
        .editor-summary { font-size: 11px; color: #666; margin-top: 3px; }
        .editor-close {
            background: none; border: none; color: #555;
            font-size: 18px; cursor: pointer; padding: 0;
        }
        .editor-close:hover { color: #e05c5c; }
        .editor-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .change-card {
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
        }
        .change-card-header {
            padding: 10px 14px;
            background: #141414;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .change-file { font-size: 12px; color: #4caf82; font-family: monospace; }
        .change-action {
            font-size: 10px; padding: 2px 8px;
            border-radius: 10px; text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .change-action.replace { background: rgba(240,192,96,0.15); color: #f0c060; border: 1px solid #f0c060; }
        .change-action.create  { background: rgba(76,175,130,0.15); color: #4caf82; border: 1px solid #4caf82; }
        .change-action.append  { background: rgba(92,168,224,0.15); color: #5ca8e0; border: 1px solid #5ca8e0; }
        .change-reason { font-size: 11px; color: #555; flex: 1; }
        .diff-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #2a2a2a; }
        .diff-before, .diff-after {
            padding: 10px 12px;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 160px;
            overflow-y: auto;
        }
        .diff-before { background: #1a0a0a; color: #e05c5c; }
        .diff-after  { background: #0a1a0a; color: #4caf82; }
        .diff-label { font-size: 9px; padding: 3px 12px; letter-spacing: 0.1em; text-transform: uppercase; }
        .diff-label.before { background: #1a0a0a; color: #5a2a2a; }
        .diff-label.after  { background: #0a1a0a; color: #2a5a2a; }
        .editor-footer {
            padding: 12px 16px;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .btn-apply-all {
            background: #4caf82; color: #0d0d0d;
            border: none; font-family: inherit;
            font-size: 12px; font-weight: 600;
            padding: 8px 20px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-apply-all:hover { background: #5cd090; }
        .btn-reject-all {
            background: none; color: #e05c5c;
            border: 1px solid #e05c5c;
            font-family: inherit; font-size: 12px;
            padding: 8px 20px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-reject-all:hover { background: rgba(224,92,92,0.1); }
    </style>
</head>
<body>

    <!-- Editor proposal panel -->
    <div id="editor-panel">
        <div class="editor-box">
            <div class="editor-header">
                <div>
                    <div class="editor-title">⚠️ Code Change Proposal</div>
                    <div class="editor-summary" id="editor-summary"></div>
                </div>
                <button class="editor-close" onclick="closeEditor()">&#x2715;</button>
            </div>
            <div class="editor-body" id="editor-body"></div>
            <div class="editor-footer">
                <button class="btn-reject-all" onclick="closeEditor()">Reject All</button>
                <button class="btn-apply-all" onclick="applyAll()">&#x2713; Apply All Changes</button>
            </div>
        </div>
    </div>

    <header>
        <span id="search-indicator">🔍 Searching…</span>
        <button id="websearch-btn" onclick="toggleWebSearch()">🔍 Web Search: OFF</button>
        <button onclick="clearChat()">Clear</button>
    </header>

    <div id="messages"></div>

    <!-- Image preview bar (shown when image is attached) -->
    <div id="image-preview-bar">
        <img id="image-preview" src="" alt="preview" />
        <span class="preview-label">Image attached</span>
        <button id="remove-image-btn" onclick="removeFile()">✕ Remove</button>
    </div>

    <div class="input-bar">
        <button id="upload-btn" onclick="document.getElementById('file-input').click()" title="Attach file">📎</button>
        <input type="file" id="file-input" accept="image/jpeg,image/png,image/gif,image/webp,application/pdf,.py,.js,.ts,.jsx,.tsx,.java,.c,.cpp,.cs,.go,.rb,.rs,.php,.sh,.sql,.html,.css,.json,.yaml,.yml,.toml,.md,.txt" style="display:none" onchange="handleFileSelect(event)" />
        <textarea id="input" rows="1" placeholder="Enter your prompt…"></textarea>
        <button id="send-btn" onclick="sendMessage()">Send ↑</button>
    </div>

    <script>
        let isStreaming = false;
        let webSearchEnabled = false;
        let attachedImage = null;  // { b64, mime, dataUrl }
        let attachedFile  = null;  // { context, filename, summary }

        document.getElementById("input").addEventListener("input", function () {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });

        document.getElementById("input").addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        function toggleWebSearch() {
            webSearchEnabled = !webSearchEnabled;
            const btn = document.getElementById("websearch-btn");
            btn.textContent = webSearchEnabled ? "🔍 Web Search: ON" : "🔍 Web Search: OFF";
            btn.classList.toggle("active", webSearchEnabled);
        }

        function clearChat() {
            if (isStreaming) return;
            document.getElementById("messages").innerHTML = "";
        }

        // ── FILE HANDLING ─────────────────────────────────────────────────────

        async function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            e.target.value = "";

            if (file.size > 10 * 1024 * 1024) { alert("File too large. Max 10MB."); return; }

            if (file.type.startsWith("image/")) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const dataUrl = ev.target.result;
                    attachedImage = { b64: dataUrl.split(",")[1], mime: file.type, dataUrl };
                    attachedFile = null;
                    showPreview(file.name, dataUrl, true);
                };
                reader.readAsDataURL(file);
            } else {
                showPreview(file.name, null, false, "Extracting...");
                const form = new FormData();
                form.append("file", file);
                try {
                    const res = await fetch("/upload", { method: "POST", body: form });
                    const data = await res.json();
                    if (!res.ok) { alert(data.error || "Upload failed"); removeFile(); return; }
                    attachedFile = { context: data.content, filename: data.filename, summary: data.summary };
                    attachedImage = null;
                    showPreview(data.filename, null, false, data.summary);
                } catch(err) {
                    alert("Upload failed: " + err.message);
                    removeFile();
                }
            }
        }

        function showPreview(filename, imageDataUrl, isImage, label) {
            const img = document.getElementById("image-preview");
            document.getElementById("image-preview-bar").style.display = "flex";
            document.getElementById("upload-btn").classList.add("has-file");
            document.querySelector(".preview-label").textContent = label || filename;
            img.style.display = isImage ? "block" : "none";
            if (isImage && imageDataUrl) img.src = imageDataUrl;
        }

        function removeFile() {
            attachedImage = null;
            attachedFile  = null;
            document.getElementById("image-preview-bar").style.display = "none";
            document.getElementById("upload-btn").classList.remove("has-file");
        }

        // ── MESSAGE HELPERS ───────────────────────────────────────────────────

        function addMessage(role, text, imageDataUrl, fileLabel) {
            const box = document.getElementById("messages");
            const wrap = document.createElement("div");
            wrap.classList.add("msg-wrap", role);

            const label = document.createElement("div");
            label.classList.add("msg-label");
            label.textContent = role === "user" ? "You" : "AI";

            const bubble = document.createElement("div");
            bubble.classList.add("msg-bubble");

            if (imageDataUrl) {
                const img = document.createElement("img");
                img.src = imageDataUrl;
                img.classList.add("msg-image");
                bubble.appendChild(img);
            }
            if (fileLabel) {
                const tag = document.createElement("div");
                tag.style.cssText = "font-size:11px;color:#4caf82;margin-bottom:4px;";
                tag.textContent = "📎 " + fileLabel;
                bubble.appendChild(tag);
            }
            if (role === "user" && text) {
                bubble.appendChild(document.createTextNode(text));
            }

            wrap.appendChild(label);
            wrap.appendChild(bubble);
            box.appendChild(wrap);
            wrap.scrollIntoView({ block: "end", behavior: "smooth" });
            return bubble;
        }

        function addTyping() {
            const box = document.getElementById("messages");
            const wrap = document.createElement("div");
            wrap.classList.add("msg-wrap", "ai");
            wrap.id = "typing-indicator";
            const label = document.createElement("div");
            label.classList.add("msg-label");
            label.textContent = "AI";
            const dots = document.createElement("div");
            dots.classList.add("typing");
            dots.innerHTML = "<span></span><span></span><span></span>";
            wrap.appendChild(label);
            wrap.appendChild(dots);
            box.appendChild(wrap);
            wrap.scrollIntoView({ block: "end", behavior: "smooth" });
        }

        function removeTyping() {
            const el = document.getElementById("typing-indicator");
            if (el) el.remove();
        }

        // ── SEND MESSAGE ──────────────────────────────────────────────────────

        async function sendMessage() {
            if (isStreaming) return;
            const input = document.getElementById("input");
            const btn   = document.getElementById("send-btn");
            const msg   = input.value.trim();
            if (!msg && !attachedImage && !attachedFile) return;

            const imgSnap  = attachedImage;
            const fileSnap = attachedFile;
            input.value = "";
            input.style.height = "auto";
            btn.disabled = true;
            isStreaming = true;

            addMessage("user", msg, imgSnap?.dataUrl, fileSnap?.summary);
            removeFile();
            addTyping();
            const aiBody = addMessage("ai", null);
            removeTyping();

            let rawBuffer = "";

            try {
                const payload = {
                    message: msg || (imgSnap ? "Analyze this image." : "Analyze this file."),
                    web_search: webSearchEnabled
                };
                if (imgSnap)  { payload.image_b64 = imgSnap.b64; payload.image_mime = imgSnap.mime; }
                if (fileSnap) { payload.file_context = fileSnap.context; }

                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buf = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buf += decoder.decode(value, { stream: true });
                    const parts = buf.split("\n\n");
                    buf = parts.pop();
                    for (const part of parts) {
                        for (const line of part.split("\n")) {
                            if (!line.startsWith("data: ")) continue;
                            const jsonStr = line.slice(6).trim();
                            if (!jsonStr || jsonStr === "[DONE]") continue;
                            try {
                                const data = JSON.parse(jsonStr);
                                if (data.type === "search_used") {
                                    document.getElementById("search-indicator").style.display = "inline";
                                } else if (data.type === "editor_proposal") {
                                    openEditorProposal(data.ai_response);
                                } else if (data.type === "token") {
                                    rawBuffer += data.text;
                                    aiBody.textContent = rawBuffer;
                                    aiBody.scrollIntoView({ block: "end", behavior: "instant" });
                                } else if (data.type === "done") {
                                    document.getElementById("search-indicator").style.display = "none";
                                    aiBody.innerHTML = data.html;
                                    aiBody.scrollIntoView({ block: "end", behavior: "instant" });
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) {
                aiBody.textContent = "⚠ Connection error. Please try again.";
                console.error(err);
            }

            btn.disabled = false;
            isStreaming = false;
        }
        // ── EDITOR ─────────────────────────────────────────────────────────

        let pendingChanges = [];

        async function openEditorProposal(aiResponse) {
            const res = await fetch("/editor/propose", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ai_response: aiResponse })
            });
            const data = await res.json();
            if (!res.ok) { console.error("Editor propose failed:", data.error); return; }

            pendingChanges = data.changes;
            document.getElementById("editor-summary").textContent = data.summary;

            const body = document.getElementById("editor-body");
            body.innerHTML = "";

            data.changes.forEach((change, i) => {
                const card = document.createElement("div");
                card.classList.add("change-card");
                card.innerHTML = `
                    <div class="change-card-header">
                        <span class="change-file">${change.file}</span>
                        <span class="change-action ${change.action}">${change.action}</span>
                        <span class="change-reason">${change.reason || ""}</span>
                    </div>
                    ${ change.preview ? `
                    <div class="diff-label before">Before</div>
                    <div class="diff-wrap">
                        <div class="diff-before">${escHtml(change.preview.before || "")}</div>
                        <div class="diff-after">${escHtml(change.preview.after || "")}</div>
                    </div>
                    <div class="diff-label after">After</div>` : "" }
                `;
                body.appendChild(card);
            });

            document.getElementById("editor-panel").classList.add("show");
        }

        function escHtml(str) {
            return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        }

        function closeEditor() {
            document.getElementById("editor-panel").classList.remove("show");
            pendingChanges = [];
        }

        async function applyAll() {
            if (!pendingChanges.length) return;
            const btn = document.querySelector(".btn-apply-all");
            btn.textContent = "Applying...";
            btn.disabled = true;

            const res = await fetch("/editor/apply", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ changes: pendingChanges })
            });
            const data = await res.json();

            closeEditor();

            const msg = data.failed === 0
                ? `✓ Applied ${data.applied} change(s) successfully. Restart the app to see effects.`
                : `Applied ${data.applied}, failed ${data.failed}. Check terminal for details.`;

            const notice = document.createElement("div");
            notice.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#161616;border:1px solid #4caf82;color:#4caf82;padding:10px 20px;border-radius:8px;font-size:12px;z-index:999;";
            notice.textContent = msg;
            document.body.appendChild(notice);
            setTimeout(() => notice.remove(), 4000);
        }

    </script>
</body>
</html>
